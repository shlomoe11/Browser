<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   NEXUS BROWSER  ·  White / Light Theme
══════════════════════════════════════════════ */
:root {
  --bg-0:      #f5f6f8;
  --bg-1:      #ffffff;
  --bg-2:      #f0f1f5;
  --bg-3:      #e8eaf0;
  --chrome:    #dde0ea;
  --border:    #d0d4e0;
  --border-hi: #b0b5c8;

  --accent:    #2563eb;
  --accent2:   #7c3aed;
  --accent3:   #f59e0b;
  --danger:    #ef4444;
  --success:   #16a34a;

  --text-1:    #1a1d2e;
  --text-2:    #4b5370;
  --text-3:    #8b93a8;

  --radius:    6px;
  --radius-lg: 12px;

  --font-ui:   'Syne', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --toolbar-h:   52px;
  --tabbar-h:    38px;
  --statusbar-h: 22px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg-0);
  color: var(--text-1);
  font-family: var(--font-ui);
  font-size: 13px;
  -webkit-font-smoothing: antialiased;
}

/* ── PASSWORD SCREEN ───────────────────────── */
#password-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #f5f7ff 0%, #eef1fb 100%);
}
#password-screen.hidden { display: none; }

.pw-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(37,99,235,.08), 0 4px 16px rgba(0,0,0,.06);
  padding: 48px 40px;
  display: flex; flex-direction: column; align-items: center;
  gap: 24px;
  min-width: 320px;
  animation: cardIn .4s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(.97); }
  to   { opacity: 1; transform: none; }
}

.pw-logo-mark svg { width: 64px; height: 64px; }
.pw-wordmark {
  font-weight: 800; font-size: 28px; letter-spacing: -1px;
  background: linear-gradient(135deg, #1a1d2e 30%, var(--accent) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.pw-sub {
  font-size: 11px; color: var(--text-3);
  letter-spacing: 2px; text-transform: uppercase;
}
.pw-label {
  font-size: 12px; color: var(--text-2);
  font-weight: 600; align-self: flex-start;
}
.pw-input-wrap {
  width: 100%; position: relative;
}
.pw-input-wrap input {
  width: 100%;
  padding: 11px 40px 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 15px;
  letter-spacing: 4px;
  background: var(--bg-0);
  color: var(--text-1);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.pw-input-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
}
.pw-eye {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  cursor: pointer; color: var(--text-3); font-size: 16px;
  transition: color .15s;
}
.pw-eye:hover { color: var(--text-2); }

.pw-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none; border-radius: var(--radius);
  color: #fff; font-family: var(--font-ui);
  font-weight: 700; font-size: 14px;
  cursor: pointer;
  transition: background .15s, transform .1s, box-shadow .15s;
  box-shadow: 0 4px 14px rgba(37,99,235,.3);
}
.pw-btn:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(37,99,235,.35); }
.pw-btn:active { transform: none; }

.pw-error {
  color: var(--danger); font-size: 12px;
  text-align: center; display: none;
  animation: shake .3s ease;
}
.pw-error.show { display: block; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* ── LAYOUT ────────────────────────────────── */
#browser {
  display: flex; flex-direction: column;
  height: 100vh;
}

/* ── TAB BAR ───────────────────────────────── */
#tabbar {
  display: flex; align-items: flex-end;
  height: var(--tabbar-h);
  background: var(--bg-2);
  border-bottom: 1px solid var(--border);
  padding: 0 8px; gap: 2px;
  overflow-x: auto; scrollbar-width: none;
  flex-shrink: 0;
}
#tabbar::-webkit-scrollbar { display: none; }

.tab {
  display: flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 12px 0 14px;
  background: var(--bg-3);
  border: 1px solid var(--border); border-bottom: none;
  border-radius: var(--radius) var(--radius) 0 0;
  cursor: pointer; color: var(--text-2);
  font-size: 11.5px; white-space: nowrap;
  max-width: 180px; min-width: 80px;
  transition: background .15s, color .15s, border-color .15s;
  position: relative;
}
.tab.active {
  background: var(--bg-1);
  border-color: var(--border-hi); color: var(--text-1);
}
.tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
  background: var(--bg-1);
}
.tab:hover:not(.active) { background: var(--chrome); color: var(--text-1); }
.tab-favicon { width: 14px; height: 14px; flex-shrink: 0; }
.tab-title { overflow: hidden; text-overflow: ellipsis; flex: 1; }
.tab-close {
  width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 11px; color: var(--text-3);
  transition: background .1s, color .1s; flex-shrink: 0;
}
.tab-close:hover { background: rgba(0,0,0,.1); color: var(--text-1); }

#tab-new {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius); color: var(--text-3);
  cursor: pointer; font-size: 18px; margin-left: 4px; flex-shrink: 0;
  transition: background .15s, color .15s;
}
#tab-new:hover { background: var(--chrome); color: var(--accent); }

/* ── TOOLBAR ───────────────────────────────── */
#toolbar {
  display: flex; align-items: center;
  height: var(--toolbar-h);
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  padding: 0 10px; gap: 6px; flex-shrink: 0;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

.nav-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent;
  border-radius: var(--radius); color: var(--text-2);
  cursor: pointer; font-size: 16px; flex-shrink: 0;
  transition: background .12s, border-color .12s, color .12s;
}
.nav-btn:hover:not(:disabled) {
  background: var(--bg-2); border-color: var(--border); color: var(--text-1);
}
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }

#address-wrap {
  flex: 1; display: flex; align-items: center;
  background: var(--bg-0); border: 1.5px solid var(--border);
  border-radius: 24px; height: 34px; padding: 0 14px; gap: 8px;
  transition: border-color .15s, box-shadow .15s; position: relative; overflow: hidden;
}
#address-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
}
#secure-icon { font-size: 13px; color: var(--text-3); flex-shrink: 0; }
#secure-icon.secure { color: var(--success); }

#address-bar {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text-1); font-family: var(--font-mono);
  font-size: 12px; caret-color: var(--accent);
  text-align: right;
}
#address-bar::placeholder { color: var(--text-3); font-family: var(--font-ui); font-size: 12px; }

#loading-bar {
  position: absolute; bottom: 0; left: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  width: 0; opacity: 0;
  transition: width .05s linear, opacity .2s;
  border-radius: 0 1px 1px 0; pointer-events: none;
}
#loading-bar.active { opacity: 1; }

#go-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent); border: none; border-radius: 50%;
  cursor: pointer; color: #fff; font-size: 14px; flex-shrink: 0;
  transition: background .12s, transform .1s;
}
#go-btn:hover { background: #1d4ed8; transform: scale(1.08); }

.toolbar-action {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid transparent;
  border-radius: var(--radius); color: var(--text-2);
  cursor: pointer; font-size: 16px; flex-shrink: 0;
  transition: background .12s, border-color .12s, color .12s;
}
.toolbar-action:hover { background: var(--bg-2); border-color: var(--border); color: var(--text-1); }
.toolbar-action.starred { color: var(--accent3); }

/* ── CONTENT AREA ──────────────────────────── */
#content-area { flex: 1; position: relative; overflow: hidden; background: var(--bg-0); }

/* ── HOME PAGE ─────────────────────────────── */
#home-page {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px; z-index: 10;
  background: linear-gradient(160deg, #f0f4ff 0%, #f8f9ff 100%);
}
#home-page.hidden { display: none; }

.nexus-wordmark {
  font-weight: 800; font-size: 40px; letter-spacing: -2px;
  background: linear-gradient(135deg, #1a1d2e 20%, var(--accent) 80%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nexus-tagline {
  font-size: 11px; color: var(--text-3);
  letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
  margin-top: -20px;
}

/* Google search bar on home */
#home-search-wrap {
  display: flex; align-items: center;
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 32px; height: 46px;
  padding: 0 18px; gap: 10px;
  width: min(500px, 88vw);
  box-shadow: 0 2px 12px rgba(37,99,235,.08);
  transition: border-color .15s, box-shadow .15s;
}
#home-search-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,.12), 0 4px 16px rgba(37,99,235,.1);
}
#home-search {
  flex: 1; border: none; outline: none;
  background: transparent; font-family: var(--font-ui);
  font-size: 14px; color: var(--text-1); text-align: right;
}
#home-search::placeholder { color: var(--text-3); }
#home-search-btn {
  background: var(--accent); border: none;
  border-radius: 50%; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; font-size: 15px;
  transition: background .12s, transform .1s;
}
#home-search-btn:hover { background: #1d4ed8; transform: scale(1.08); }

#quick-tiles {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; width: min(480px, 90vw);
}
.qtile {
  aspect-ratio: 1;
  background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius-lg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; cursor: pointer; color: var(--text-2);
  font-size: 11px; text-align: center; padding: 10px 6px;
  transition: background .15s, border-color .15s, color .15s, transform .12s, box-shadow .15s;
  box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.qtile:hover {
  background: #f0f4ff; border-color: var(--accent);
  color: var(--accent); transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(37,99,235,.12);
}
.qtile-icon { font-size: 22px; }
.qtile-label { font-weight: 600; }

/* ── IFRAME VIEW (per-tab) ─────────────────── */
.tab-frame {
  position: absolute; inset: 0;
  width: 100%; height: 100%; border: none;
  opacity: 0; transition: opacity .25s; background: #fff;
  display: none;
}
.tab-frame.active-frame { display: block; }
.tab-frame.ready { opacity: 1; }

/* ── OVERLAY LOADER ────────────────────────── */
#overlay-loader {
  position: absolute; inset: 0;
  background: rgba(245,246,248,.9);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 20;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
#overlay-loader.show { opacity: 1; pointer-events: all; }

.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#loader-url {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── ERROR PANEL ───────────────────────────── */
#error-panel {
  position: absolute; inset: 0; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 15;
  background: linear-gradient(160deg, #fff8f8 0%, #fff 100%);
}
#error-panel.show { display: flex; }
.error-code { font-size: 64px; font-weight: 800; color: var(--danger); line-height: 1; }
.error-msg { font-size: 14px; color: var(--text-2); text-align: center; max-width: 400px; }
.error-detail {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 14px;
  max-width: 500px; word-break: break-all; text-align: center;
}
.retry-btn {
  padding: 8px 24px; background: var(--bg-1);
  border: 1.5px solid var(--border-hi); border-radius: var(--radius);
  color: var(--text-1); cursor: pointer; font-family: var(--font-ui);
  font-weight: 600; font-size: 13px; transition: background .15s, border-color .15s;
}
.retry-btn:hover { background: var(--bg-2); border-color: var(--accent); color: var(--accent); }

/* ── STATUS BAR ────────────────────────────── */
#statusbar {
  height: var(--statusbar-h);
  background: var(--bg-1); border-top: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px; gap: 12px; flex-shrink: 0;
}
#status-text {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.status-pill {
  font-family: var(--font-mono); font-size: 10px; color: var(--text-3);
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 10px; padding: 1px 7px; flex-shrink: 0;
}
.status-pill.ok  { color: var(--success); border-color: rgba(22,163,74,.25); }
.status-pill.err { color: var(--danger);  border-color: rgba(239,68,68,.25); }

/* ── BOOKMARKS DROPDOWN ────────────────────── */
#bookmarks-dropdown {
  position: absolute;
  top: calc(var(--tabbar-h) + var(--toolbar-h));
  left: 10px;
  width: 280px;
  background: var(--bg-1);
  border: 1.5px solid var(--border-hi);
  border-radius: var(--radius-lg);
  box-shadow: 0 16px 48px rgba(0,0,0,.12);
  z-index: 100; overflow: hidden;
  opacity: 0; pointer-events: none;
  transform: translateY(-8px) scale(.97);
  transition: opacity .15s, transform .15s;
}
#bookmarks-dropdown.open {
  opacity: 1; pointer-events: all; transform: translateY(0) scale(1);
}
.bm-header {
  padding: 10px 14px 6px; font-weight: 700; font-size: 11px;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-3); border-bottom: 1px solid var(--border);
}
.bm-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; cursor: pointer;
  transition: background .12s; font-size: 12.5px; color: var(--text-1);
}
.bm-item:hover { background: var(--bg-2); }

/* ── CONTEXT MENU ──────────────────────────── */
#ctx-menu {
  position: fixed;
  background: var(--bg-1); border: 1.5px solid var(--border-hi);
  border-radius: var(--radius-lg);
  box-shadow: 0 12px 36px rgba(0,0,0,.12);
  z-index: 200; min-width: 180px; overflow: hidden;
  opacity: 0; pointer-events: none;
  transform: scale(.95); transition: opacity .1s, transform .1s;
}
#ctx-menu.open { opacity: 1; pointer-events: all; transform: scale(1); }
.ctx-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px; cursor: pointer;
  font-size: 12.5px; color: var(--text-1); transition: background .1s;
}
.ctx-item:hover { background: var(--bg-2); }
.ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

/* ── SCROLLBAR ─────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
#home-page > * { animation: fadeIn .4s ease both; }
#home-page > *:nth-child(1) { animation-delay: .05s; }
#home-page > *:nth-child(2) { animation-delay: .1s; }
#home-page > *:nth-child(3) { animation-delay: .15s; }
#home-page > *:nth-child(4) { animation-delay: .2s; }
</style>
</head>
<body>

<!-- ── PASSWORD SCREEN ─────────────────────── -->
<div id="password-screen">
  <div class="pw-card">
    <div class="pw-logo-mark">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" stroke="#2563eb" stroke-width="1.5" opacity=".4"/>
        <circle cx="32" cy="32" r="20" stroke="#7c3aed" stroke-width="1" opacity=".5"/>
        <circle cx="32" cy="32" r="10" stroke="#2563eb" stroke-width="2"/>
        <line x1="2" y1="32" x2="62" y2="32" stroke="#2563eb" stroke-width=".5" opacity=".5"/>
        <line x1="32" y1="2" x2="32" y2="62" stroke="#2563eb" stroke-width=".5" opacity=".5"/>
        <circle cx="32" cy="32" r="3" fill="#2563eb"/>
      </svg>
    </div>
    <div class="pw-wordmark">NEXUS_V1</div>
    <div class="pw-sub">דפדפן אינטרנט · כניסה מאובטחת</div>
    <div class="pw-label">קוד גישה</div>
    <div class="pw-input-wrap">
      <input type="password" id="pw-input" placeholder="הכנס קוד גישה..."
             autocomplete="off" onkeydown="onPwKey(event)">
      <span class="pw-eye" onclick="togglePwVisibility()" title="הצג/הסתר">👁</span>
    </div>
    <div class="pw-error" id="pw-error">קוד שגוי. נסה שוב.</div>
    <button class="pw-btn" onclick="submitPassword()">כניסה →</button>
  </div>
</div>

<!-- ── BROWSER SHELL ───────────────────────── -->
<div id="browser">
  <!-- TAB BAR -->
  <div id="tabbar">
    <div id="tab-new" title="לשונית חדשה" onclick="newTab()">＋</div>
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <button class="nav-btn" id="btn-back"    onclick="goBack()"     title="חזרה"  disabled>◀</button>
    <button class="nav-btn" id="btn-forward" onclick="goForward()"  title="קדימה" disabled>▶</button>
    <button class="nav-btn" id="btn-reload"  onclick="reloadPage()" title="רענן">↻</button>
    <button class="nav-btn" id="btn-home"    onclick="goHome()"     title="דף הבית">⌂</button>

    <div id="address-wrap">
      <span id="secure-icon" title="">🔒</span>
      <input id="address-bar" type="text"
             placeholder="הכנס כתובת אתר..."
             spellcheck="false" autocomplete="off"
             onkeydown="onAddressKey(event)">
      <div id="loading-bar"></div>
      <button id="go-btn" onclick="navigate()" title="עבור">→</button>
    </div>

    <button class="toolbar-action" id="btn-bookmark"       onclick="toggleBookmark()"      title="סמן עמוד">☆</button>
    <button class="toolbar-action" id="btn-bookmarks-open" onclick="toggleBookmarksMenu()" title="סימניות">📑</button>
    <button class="toolbar-action" id="btn-download"       onclick="downloadPage()"        title="הורד דף">⬇</button>
  </div>

  <!-- CONTENT -->
  <div id="content-area" oncontextmenu="showCtxMenu(event)">

    <!-- Home page -->
    <div id="home-page">
      <div class="nexus-wordmark">NEXUS_V1</div>
      <div class="nexus-tagline">דפדפן אינטרנט מתקדם</div>

      <!-- Google search bar -->
      <div id="home-search-wrap">
        <button id="home-search-btn" onclick="homeSearch()" title="חיפוש">🔍</button>
        <input id="home-search" type="text"
               placeholder="החיפוש באינטרנט אינו זמין כרגע"
               onkeydown="onHomeSearchKey(event)">
      </div>

      <div id="quick-tiles">
        <div class="qtile" onclick="loadUrl('https://www.wikipedia.org')">
          <div class="qtile-icon">📖</div>

          <div class="qtile-icon">🧡</div>
          <div class="qtile-label">Hacker News</div>
        </div>
        <div class="qtile" onclick="loadUrl('https://www.github.com')">
          <div class="qtile-icon">🐙</div>
          <div class="qtile-label">GitHub</div>
        </div>
        <div class="qtile" onclick="loadUrl('https://www.bbc.com')">
          <div class="qtile-icon">📰</div>
          <div class="qtile-label">BBC News</div>
        </div>
        <div class="qtile" onclick="loadUrl('https://www.ynet.co.il')">
          <div class="qtile-icon">🇮🇱</div>
          <div class="qtile-label">Ynet</div>
        </div>
        <div class="qtile" onclick="loadUrl('https://www.walla.co.il')">
          <div class="qtile-icon">📡</div>
          <div class="qtile-label">Walla</div>
        </div>
        <div class="qtile" onclick="loadUrl('https://stackoverflow.com')">
          <div class="qtile-icon">💬</div>
          <div class="qtile-label">Stack Overflow</div>
        </div>
        <div class="qtile" onclick="loadUrl('https://www.mako.co.il')">
          <div class="qtile-icon">📺</div>
          <div class="qtile-label">Mako</div>
        </div>
      </div>
    </div>

    <!-- iframes נוצרים דינמית לכל כרטיסיה -->
    <div id="frames-container"></div>

    <div id="overlay-loader">
      <div class="spinner"></div>
      <div id="loader-url"></div>
    </div>

    <div id="error-panel">
      <div class="error-code" id="err-code">ERR</div>
      <div class="error-msg"  id="err-msg">לא ניתן לטעון את הדף</div>
      <div class="error-detail" id="err-detail"></div>
      <button class="retry-btn" onclick="retryPage()">נסה שוב</button>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div id="status-text">מוכן</div>
    <div class="status-pill" id="status-pill">NEXUS</div>
    <div class="status-pill" id="status-code-pill" style="display:none"></div>
  </div>
</div>

<!-- BOOKMARKS DROPDOWN -->
<div id="bookmarks-dropdown">
  <div class="bm-header">סימניות</div>
  <div id="bm-list"></div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAction('open-new')">🗗 פתח בלשונית חדשה</div>
  <div class="ctx-item" onclick="ctxAction('copy-url')">📋 העתק כתובת</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('reload')">↻ רענן דף</div>
  <div class="ctx-item" onclick="ctxAction('save')">💾 שמור דף</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('view-source')">🔤 קוד מקור</div>
</div>

<script>
/* ══════════════════════════════════════════════
   הגדר כאן את כתובת הפריסה של ה-Google Apps Script
══════════════════════════════════════════════ */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFTfQHtWvAC2z8dAL_WrKqznQYzGAz2ymT62BqGojTT17Ry4KXZflrv_tDNXmPOYvFOA/exec';

/* ─────────────────────────────────────────────
   PASSWORD LOGIC
───────────────────────────────────────────── */
const CORRECT_HASH = '9b8d4a3e'; // internal marker – real check is server-side

function onPwKey(e) { if (e.key === 'Enter') submitPassword(); }

function togglePwVisibility() {
  const inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function submitPassword() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;
  const err = document.getElementById('pw-error');
  err.classList.remove('show');

  // Send to server for validation
  try {
    const res = await apiFetch('validatePassword', { password: pw });
    if (res && res.valid) {
      localStorage.setItem('nexus_pass', pw);
      document.getElementById('password-screen').classList.add('hidden');
      initBrowser();
    } else {
      err.classList.add('show');
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  } catch(e) {
    err.textContent = 'שגיאת חיבור לשרת.';
    err.classList.add('show');
  }
}

function checkStoredPassword() {
  const stored = localStorage.getItem('nexus_pass');
  if (stored) {
    // Validate saved password with server silently
    apiFetch('validatePassword', { password: stored })
      .then(res => {
        if (res && res.valid) {
          document.getElementById('password-screen').classList.add('hidden');
          initBrowser();
        } else {
          localStorage.removeItem('nexus_pass');
        }
      })
      .catch(() => {
        // Network error — still show password screen
      });
  }
}

/* ─────────────────────────────────────────────
   API COMMUNICATION
───────────────────────────────────────────── */
async function apiFetch(action, params = {}) {
  const password = localStorage.getItem('nexus_pass') || document.getElementById('pw-input')?.value || '';
  const body = { action, password, ...params };
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(body),
    headers: { 'Content-Type': 'text/plain' } // GAS requires text/plain for POST
  });
  const text = await res.text();
  return JSON.parse(text);
}

/* ─────────────────────────────────────────────
   BROWSER STATE
───────────────────────────────────────────── */
let tabs = [], activeTabId = null, nextTabId = 1;

function initBrowser() {
  newTab();
  loadBookmarks();
  document.addEventListener('click', hideAllDropdowns);
  window.addEventListener('message', onIframeMessage);
}

/* ─────────────────────────────────────────────
   TAB MANAGEMENT
───────────────────────────────────────────── */
function newTab(url) {
  const id = nextTabId++;
  // יצירת iframe ייעודי לכרטיסיה זו
  const iframe = document.createElement('iframe');
  iframe.id = 'frame-' + id;
  iframe.className = 'tab-frame';
  iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation-by-user-activation');
  document.getElementById('frames-container').appendChild(iframe);

  tabs.push({ id, title: 'לשונית חדשה', url: '', history: [], histIdx: -1, favicon: '🌐', bookmarked: false, pageHtml: null });
  renderTabs();
  switchTab(id);
  if (url) loadUrl(url);
}

function getTabFrame(id) {
  return document.getElementById('frame-' + id);
}

function switchTab(id) {
  // הסתר כל הframes
  document.querySelectorAll('.tab-frame').forEach(f => f.classList.remove('active-frame'));
  // הצג את הframe של הכרטיסיה הנבחרת
  const frame = getTabFrame(id);
  if (frame) frame.classList.add('active-frame');

  activeTabId = id;
  renderTabs();
  const t = getTab(id);
  document.getElementById('address-bar').value = t.url || '';
  updateNavButtons();
  updateSecureIcon(t.url);
  updateBookmarkBtn(t);

  if (!t.url) showHome(true);
  else showHome(false);
}

function closeTab(id, ev) {
  ev.stopPropagation();
  if (tabs.length === 1) { newTab(); }
  const idx = tabs.findIndex(t => t.id === id);
  // מחק את ה-iframe של הכרטיסיה
  const frame = getTabFrame(id);
  if (frame) frame.remove();
  tabs = tabs.filter(t => t.id !== id);
  if (activeTabId === id) switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
  renderTabs();
}

function getTab(id)  { return tabs.find(t => t.id === id); }
function activeTab() { return getTab(activeTabId); }

function renderTabs() {
  const bar = document.getElementById('tabbar');
  const newBtn = document.getElementById('tab-new');
  bar.querySelectorAll('.tab').forEach(el => el.remove());
  tabs.forEach(t => {
    const div = document.createElement('div');
    div.className = 'tab' + (t.id === activeTabId ? ' active' : '');
    div.innerHTML = `<span class="tab-favicon">${t.favicon}</span>
                     <span class="tab-title">${escHtml(t.title)}</span>
                     <span class="tab-close" data-closeid="${t.id}">✕</span>`;
    div.addEventListener('click', e => { if (!e.target.dataset.closeid) switchTab(t.id); });
    div.querySelector('.tab-close').addEventListener('click', e => closeTab(t.id, e));
    bar.insertBefore(div, newBtn);
  });
}

/* ─────────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────────── */
function navigate() {
  let val = document.getElementById('address-bar').value.trim();
  if (!val) return;
  if (!val.includes('.') && !val.startsWith('http')) {
    // treat as search query
    loadUrl('https://search.yahoo.com/search?p=' + encodeURIComponent(val));
    return;
  }
  if (!/^https?:\/\//i.test(val)) val = 'https://' + val;
  loadUrl(val);
}

async function homeSearch() {
  const q = document.getElementById('home-search').value.trim();
  if (!q) return;
  showLoader('מחפש: ' + q);
  setStatus('מחפש: ' + q);
  startLoadingBar();
  try {
    const data = await apiFetch('search', { q });
    stopLoadingBar(); hideLoader();
    if (data.error) { showError('ERR', 'שגיאת חיפוש', data.message); return; }
    const t = activeTab(); if (!t) return;
    t.url = 'nexus://search?q=' + encodeURIComponent(q);
    t.title = 'חיפוש: ' + q;
    t.pageHtml = data.html;
    document.getElementById('address-bar').value = t.url;
    t.history = t.history.slice(0, t.histIdx + 1);
    t.history.push(t.url); t.histIdx = t.history.length - 1;
    updateNavButtons(); renderTabs();
    showPage(data.html);
    setStatus('נמצאו תוצאות עבור: ' + q);
    setStatusCode(200, true);
  } catch(e) {
    stopLoadingBar(); hideLoader();
    showError('ERR', 'שגיאת חיפוש', e.message);
  }
}

function onHomeSearchKey(e) { if (e.key === 'Enter') homeSearch(); }
function onAddressKey(e)    { if (e.key === 'Enter') navigate(); }

function loadUrl(url) {
  const t = activeTab(); if (!t) return;
  t.url = url;
  document.getElementById('address-bar').value = url;
  updateSecureIcon(url);
  t.history = t.history.slice(0, t.histIdx + 1);
  t.history.push(url);
  t.histIdx = t.history.length - 1;
  updateNavButtons();
  fetchPage(url);
}

function goBack() {
  const t = activeTab(); if (!t || t.histIdx <= 0) return;
  t.histIdx--; t.url = t.history[t.histIdx];
  document.getElementById('address-bar').value = t.url;
  updateSecureIcon(t.url); updateNavButtons(); fetchPage(t.url);
}
function goForward() {
  const t = activeTab(); if (!t || t.histIdx >= t.history.length - 1) return;
  t.histIdx++; t.url = t.history[t.histIdx];
  document.getElementById('address-bar').value = t.url;
  updateSecureIcon(t.url); updateNavButtons(); fetchPage(t.url);
}
function reloadPage() { const t = activeTab(); if (t && t.url) fetchPage(t.url); }
function retryPage()  { const t = activeTab(); if (t && t.url) { fetchPage(t.url); document.getElementById('error-panel').classList.remove('show'); } }
function goHome() {
  const t = activeTab(); if (!t) return;
  t.url = ''; t.pageHtml = null;
  document.getElementById('address-bar').value = '';
  showHome(true); setStatus('מוכן'); updateNavButtons();
}

/* ─────────────────────────────────────────────
   FETCH & RENDER
───────────────────────────────────────────── */
async function fetchPage(url) {
  showLoader(url); setStatus('מתחבר ל-' + url); startLoadingBar();
  try {
    const data = await apiFetch('proxyPage', { url });
    onPageLoaded(data);
  } catch(e) {
    onFetchError(e);
  }
}

function onPageLoaded(data) {
  stopLoadingBar(); hideLoader();
  if (!data) { showError('ERR', 'תגובה ריקה מהשרת', ''); return; }
  if (data.error) { showError('ERR', 'שגיאה בטעינת הדף', data.message || ''); return; }
  if (data.auth === false) {
    localStorage.removeItem('nexus_pass');
    location.reload();
    return;
  }

  const t = activeTab(); if (!t) return;

  if (data.b64) {
    const blob = new Blob([Uint8Array.from(atob(data.b64), c => c.charCodeAt(0))], { type: data.contentType });
    const iframe = getTabFrame(activeTabId);
    if (!iframe) return;
    iframe.src = URL.createObjectURL(blob);
    iframe.classList.add('ready');
    document.getElementById('home-page').classList.add('hidden');
    setStatus('קובץ: ' + data.contentType);
    return;
  }

  if (!data.html) return;
  t.pageHtml = data.html;
  setStatusCode(data.code || 200, (data.code || 200) < 400);
  setStatus('נטען: ' + (t.url || ''));
  showPage(data.html);

  const titleMatch = data.html.match(/<title[^>]*>([^<]+)<\/title>/i);
  if (titleMatch) { t.title = titleMatch[1].trim().slice(0, 40); renderTabs(); }

  // Load JS assets
  if (data.js && data.js.length) {
    data.js.slice(0, 15).forEach(src => {
      apiFetch('proxyAsset', { url: src }).then(r => {
        if (!r || !r.b64) return;
        let code = atob(r.b64).replace(/\/\/# sourceMappingURL=.*/g, '');
        sendToFrame({ t: 'js', code });
      }).catch(() => {});
    });
  }

  // Load image assets
  if (data.img && data.img.length) {
    data.img.forEach(src => {
      apiFetch('proxyAsset', { url: src }).then(r => {
        if (!r || !r.b64) return;
        sendToFrame({ t: 'img', url: r.url, data: 'data:' + r.ct + ';base64,' + r.b64 });
      }).catch(() => {});
    });
  }
}

function onFetchError(err) {
  stopLoadingBar(); hideLoader();
  showError('NET_ERR', 'שגיאת רשת', typeof err === 'object' ? err.message : String(err));
}

function sendToFrame(msg) {
  const iframe = getTabFrame(activeTabId);
  if (!iframe) return;
  try { if (iframe.contentWindow) iframe.contentWindow.postMessage(msg, '*'); } catch(e) {}
}

function onIframeMessage(e) {
  if (!e.data) return;
  // מצא איזו כרטיסיה שלחה את ההודעה
  let senderTabId = activeTabId;
  for (const t of tabs) {
    const f = getTabFrame(t.id);
    if (f && f.contentWindow === e.source) { senderTabId = t.id; break; }
  }
  // העבר פוקוס לכרטיסיה השולחת
  if (senderTabId !== activeTabId) switchTab(senderTabId);

  if (e.data.t === 'nav') {
    let url = e.data.url;
    const t = getTab(senderTabId);
    if (t && t.url) { try { url = new URL(url, t.url.startsWith('nexus://') ? 'https://example.com' : t.url).href; } catch(_) {} }
    loadUrl(url);
  }
  if (e.data.t === 'search' && e.data.q) {
    document.getElementById('home-search').value = e.data.q;
    homeSearch();
  }
}

/* ─────────────────────────────────────────────
   DISPLAY HELPERS
───────────────────────────────────────────── */
function showPage(html) {
  const iframe = getTabFrame(activeTabId);
  if (!iframe) return;
  document.getElementById('home-page').classList.add('hidden');
  document.getElementById('error-panel').classList.remove('show');
  iframe.classList.remove('ready');
  iframe.srcdoc = html;
  iframe.onload = () => iframe.classList.add('ready');
}
function showHome(force) {
  document.getElementById('home-page').classList.toggle('hidden', !force);
  if (!force) return;
  // כשבדף הבית – נקה את ה-iframe של הכרטיסיה הפעילה
  const iframe = getTabFrame(activeTabId);
  if (iframe) { iframe.classList.remove('ready'); iframe.srcdoc = ''; }
}
function showLoader(url) {
  document.getElementById('overlay-loader').classList.add('show');
  document.getElementById('loader-url').textContent = url;
}
function hideLoader() { document.getElementById('overlay-loader').classList.remove('show'); }
function showError(code, msg, detail) {
  document.getElementById('err-code').textContent   = code;
  document.getElementById('err-msg').textContent    = msg;
  document.getElementById('err-detail').textContent = detail || '';
  document.getElementById('error-panel').classList.add('show');
  document.getElementById('overlay-loader').classList.remove('show');
  const _ef = getTabFrame(activeTabId);
  if (_ef) _ef.classList.remove('ready');
  setStatus('שגיאה: ' + msg);
}

let lbInterval = null, lbWidth = 0;
function startLoadingBar() {
  const bar = document.getElementById('loading-bar');
  lbWidth = 0; bar.style.width = '0%'; bar.classList.add('active');
  lbInterval = setInterval(() => {
    lbWidth = Math.min(lbWidth + Math.random() * 8, 88);
    bar.style.width = lbWidth + '%';
  }, 200);
}
function stopLoadingBar() {
  clearInterval(lbInterval);
  const bar = document.getElementById('loading-bar');
  bar.style.width = '100%';
  setTimeout(() => { bar.style.width = '0%'; bar.classList.remove('active'); }, 400);
}
function setStatus(msg) { document.getElementById('status-text').textContent = msg; }
function setStatusCode(code, ok) {
  const pill = document.getElementById('status-code-pill');
  pill.style.display = '';
  pill.textContent = 'HTTP ' + code;
  pill.className = 'status-pill ' + (ok ? 'ok' : 'err');
}
function updateBookmarkBtn(t) {
  const btn = document.getElementById('btn-bookmark');
  if (!t || !t.url) { btn.textContent = '☆'; btn.classList.remove('starred'); return; }
  const isBookmarked = bookmarks.some(b => b.url === t.url);
  btn.textContent = isBookmarked ? '★' : '☆';
  isBookmarked ? btn.classList.add('starred') : btn.classList.remove('starred');
}

function updateNavButtons() {
  const t = activeTab();
  document.getElementById('btn-back').disabled    = !t || t.histIdx <= 0;
  document.getElementById('btn-forward').disabled = !t || t.histIdx >= (t.history.length - 1);
}
function updateSecureIcon(url) {
  const icon = document.getElementById('secure-icon');
  const isHttps = /^https:\/\//i.test(url);
  icon.textContent = isHttps ? '🔒' : (url ? '⚠️' : '🔒');
  icon.className   = isHttps ? 'secure' : '';
  icon.title       = isHttps ? 'חיבור מאובטח' : 'חיבור לא מאובטח';
}

/* ─────────────────────────────────────────────
   BOOKMARKS
───────────────────────────────────────────── */
let bookmarks = [];
function loadBookmarks() {
  try { bookmarks = JSON.parse(localStorage.getItem('nexus_bookmarks') || '[]'); } catch(_) { bookmarks = []; }
  renderBookmarks();
}
function saveBookmarks() {
  try { localStorage.setItem('nexus_bookmarks', JSON.stringify(bookmarks)); } catch(_) {}
}
function toggleBookmark() {
  const t = activeTab(); if (!t || !t.url) return;
  const btn = document.getElementById('btn-bookmark');
  const idx = bookmarks.findIndex(b => b.url === t.url);
  if (idx >= 0) {
    bookmarks.splice(idx, 1);
    btn.textContent = '☆'; btn.classList.remove('starred');
  } else {
    bookmarks.push({ url: t.url, title: t.title, favicon: t.favicon });
    btn.textContent = '★'; btn.classList.add('starred');
  }
  saveBookmarks(); renderBookmarks();
}
function renderBookmarks() {
  const list = document.getElementById('bm-list');
  list.innerHTML = '';
  if (!bookmarks.length) {
    list.innerHTML = '<div class="bm-item" style="color:var(--text-3)">אין סימניות עדיין</div>';
    return;
  }
  bookmarks.forEach(bm => {
    const div = document.createElement('div');
    div.className = 'bm-item';
    div.textContent = (bm.title || bm.url).slice(0, 35);
    div.addEventListener('click', () => {
      loadUrl(bm.url);
      document.getElementById('bookmarks-dropdown').classList.remove('open');
    });
    list.appendChild(div);
  });
}
function toggleBookmarksMenu() {
  document.getElementById('bookmarks-dropdown').classList.toggle('open');
}

/* ─────────────────────────────────────────────
   CONTEXT MENU
───────────────────────────────────────────── */
let ctxRightClickUrl = null;
function showCtxMenu(e) {
  e.preventDefault();
  const menu = document.getElementById('ctx-menu');
  menu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  menu.style.top  = Math.min(e.clientY, window.innerHeight - 150) + 'px';
  menu.classList.add('open');
  ctxRightClickUrl = activeTab()?.url || '';
}
function ctxAction(action) {
  document.getElementById('ctx-menu').classList.remove('open');
  const t = activeTab();
  switch(action) {
    case 'open-new':   if (ctxRightClickUrl) newTab(ctxRightClickUrl); break;
    case 'copy-url':   if (t) navigator.clipboard.writeText(t.url).catch(()=>{}); break;
    case 'reload':     reloadPage(); break;
    case 'save':       downloadPage(); break;
    case 'view-source':
      if (t && t.pageHtml) {
        const w = window.open();
        if (w) w.document.write('<pre style="white-space:pre-wrap;font-size:12px">' + escHtml(t.pageHtml) + '</pre>');
      }
      break;
  }
}

/* ─────────────────────────────────────────────
   DOWNLOAD
───────────────────────────────────────────── */
function downloadPage() {
  const t = activeTab();
  if (!t || !t.pageHtml) return;
  const blob = new Blob([t.pageHtml], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (t.title || 'page') + '.html';
  a.click();
}

/* ─────────────────────────────────────────────
   MISC
───────────────────────────────────────────── */
function hideAllDropdowns(e) {
  if (!e.target.closest('#bookmarks-dropdown') && !e.target.closest('#btn-bookmarks-open'))
    document.getElementById('bookmarks-dropdown').classList.remove('open');
  if (!e.target.closest('#ctx-menu'))
    document.getElementById('ctx-menu').classList.remove('open');
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                       .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

/* ─────────────────────────────────────────────
   BOOT
───────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  checkStoredPassword();
});
</script>
